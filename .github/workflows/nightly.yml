name: Nightly

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ozone
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ozone
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ozone.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-nightly-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvulkan-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxkbcommon-dev pkg-config libegl-mesa0 libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get date
        id: date
        shell: bash
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Package and checksum
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=ozone-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mkdir -p dist
            cp "$BINARY" dist/
            cd dist && 7z a "../${ARCHIVE}.zip" ${{ matrix.artifact }} && cd ..
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            mkdir -p Ozone.app/Contents/MacOS
            mkdir -p Ozone.app/Contents/Resources
            cp "$BINARY" Ozone.app/Contents/MacOS/ozone
            cp packaging/macos/Info.plist Ozone.app/Contents/
            cp packaging/macos/ozone.icns Ozone.app/Contents/Resources/
            zip -r "${ARCHIVE}.zip" Ozone.app
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          else
            mkdir -p dist
            cp "$BINARY" dist/ozone
            cp packaging/linux/ozone.desktop dist/
            cp -r packaging/linux/icons dist/
            tar -czf "${ARCHIVE}.tar.gz" -C dist .
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ozone-${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          if-no-files-found: error

  nightly:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "### Changes" > CHANGELOG_NIGHTLY.md
          echo "" >> CHANGELOG_NIGHTLY.md
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" >> CHANGELOG_NIGHTLY.md
          else
            git log --pretty=format:"- %s" -30 >> CHANGELOG_NIGHTLY.md
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name "*.sha256" -exec cat {} \; | sort > checksums.sha256

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly-${{ steps.date.outputs.date }}
          name: Nightly ${{ steps.date.outputs.date }}
          body_path: CHANGELOG_NIGHTLY.md
          prerelease: true
          make_latest: false
          files: |
            artifacts/ozone-*/*.tar.gz
            artifacts/ozone-*/*.zip
            checksums.sha256
          fail_on_unmatched_files: false
