name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ozone
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ozone
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: ozone
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ozone.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvulkan-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxkbcommon-dev pkg-config libegl-mesa0 libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and checksum
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=ozone-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BINARY" dist/
            cd dist && 7z a "../${ARCHIVE}.zip" ${{ matrix.artifact }} && cd ..
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          else
            cp "$BINARY" dist/
            tar -czf "${ARCHIVE}.tar.gz" -C dist ${{ matrix.artifact }}
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ozone-${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name "*.sha256" -exec cat {} \; | sort > checksums.sha256
          echo "--- checksums.sha256 ---"
          cat checksums.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Ozone ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/ozone-*/*.tar.gz
            artifacts/ozone-*/*.zip
            checksums.sha256
          fail_on_unmatched_files: false
