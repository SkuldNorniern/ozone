name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ozone
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ozone
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ozone.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvulkan-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxkbcommon-dev pkg-config libegl-mesa0 libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and checksum
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=ozone-${{ github.ref_name }}-${{ matrix.target }}

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mkdir -p dist
            cp "$BINARY" dist/
            cd dist && 7z a "../${ARCHIVE}.zip" ${{ matrix.artifact }} && cd ..
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            mkdir -p Ozone.app/Contents/MacOS
            mkdir -p Ozone.app/Contents/Resources
            cp "$BINARY" Ozone.app/Contents/MacOS/ozone
            cp packaging/macos/Info.plist Ozone.app/Contents/
            cp packaging/macos/ozone.icns Ozone.app/Contents/Resources/
            zip -r "${ARCHIVE}.zip" Ozone.app
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          else
            mkdir -p dist
            cp "$BINARY" dist/ozone
            cp packaging/linux/ozone.desktop dist/
            cp -r packaging/linux/icons dist/
            tar -czf "${ARCHIVE}.tar.gz" -C dist .
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ozone-${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: find artifacts -name "*.sha256" -exec cat {} \; | sort > checksums.sha256

      - name: Publish release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          title: "Ozone ${{ github.ref_name }}"
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            checksums.sha256
