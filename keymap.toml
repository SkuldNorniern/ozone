[[keymap]]
keys = "ctrl+e"
command = "cursor.line-end"

[[keymap]]
keys = "ctrl+b"
command = "cursor.move-left"

[[keymap]]
keys = "ctrl+f"
command = "cursor.move-right"

[[keymap]]
keys = "ctrl+n"
command = "cursor.move-down"

[[keymap]]
keys = "meta+f"
command = "search.start"

[[keymap]]
keys = "meta+h"
command = "search.replace"

[[keymap]]
keys = "ctrl+shift+f"
command = "search.workspace"

[[keymap]]
keys = "meta+g"
command = "edit.goto-line"

[[keymap]]
keys = "meta+."
command = "lsp.goto-definition"

[[keymap]]
keys = "meta+k"
command = "lsp.hover"

[[keymap]]
keys = "ctrl+space"
command = "lsp.completion"

[[keymap]]
keys = "ctrl+home"
command = "cursor.file-start"

[[keymap]]
keys = "ctrl+end"
command = "cursor.file-end"

[[keymap]]
keys = "ctrl+left"
command = "cursor.word-backward"

[[keymap]]
keys = "ctrl+right"
command = "cursor.word-forward"

# ── Plain navigation ─────────────────────────────────────────────────────────
[[keymap]]
keys = "up"
command = "cursor.move-up"

[[keymap]]
keys = "down"
command = "cursor.move-down"

[[keymap]]
keys = "left"
command = "cursor.move-left"

[[keymap]]
keys = "right"
command = "cursor.move-right"

[[keymap]]
keys = "home"
command = "cursor.line-start"

[[keymap]]
keys = "end"
command = "cursor.line-end"

[[keymap]]
keys = "pageup"
command = "view.page-up"

[[keymap]]
keys = "pagedown"
command = "view.page-down"

# ── Editing ──────────────────────────────────────────────────────────────────
[[keymap]]
keys = "backspace"
command = "edit.delete-char-backward"

[[keymap]]
keys = "delete"
command = "edit.delete-char-forward"

[[keymap]]
keys = "enter"
command = "edit.insert-newline"

[[keymap]]
keys = "ctrl+/"
command = "edit.toggle-comment"

[[keymap]]
keys = "ctrl+d"
command = "edit.duplicate-line"

[[keymap]]
keys = "meta+up"
command = "edit.move-line-up"

[[keymap]]
keys = "meta+down"
command = "edit.move-line-down"

# ── Clipboard ────────────────────────────────────────────────────────────────
# ctrl+c/x/v work everywhere.  meta+c/x/v activate only on macOS (meta=Cmd
# there); on Windows/Linux meta=Alt and these are not standard clipboard keys.
[[keymap]]
keys = "ctrl+c"
command = "edit.copy"

[[keymap]]
keys = "ctrl+x"
command = "edit.cut"

[[keymap]]
keys = "ctrl+v"
command = "edit.paste"

# macOS-only: Cmd+C/X/V clipboard and Cmd+Space completion (ctrl+space
# collides with the macOS input-source switcher).
[[keymap]]
keys = "meta+c"
command = "edit.copy"
platform = "macos"

[[keymap]]
keys = "meta+x"
command = "edit.cut"
platform = "macos"

[[keymap]]
keys = "meta+v"
command = "edit.paste"
platform = "macos"

[[keymap]]
keys = "meta+space"
command = "lsp.completion"
platform = "macos"

# ── Selection ────────────────────────────────────────────────────────────────
[[keymap]]
keys = "meta+shift+up"
command = "select.expand"

# Keyboard extend-selection (shift+arrow family — standard across all platforms)
[[keymap]]
keys = "shift+left"
command = "select.extend-left"

[[keymap]]
keys = "shift+right"
command = "select.extend-right"

[[keymap]]
keys = "shift+up"
command = "select.extend-up"

[[keymap]]
keys = "shift+down"
command = "select.extend-down"

[[keymap]]
keys = "shift+home"
