[[keymap]]
keys = "shift+end"
command = "select.extend-line-end"

[[keymap]]
keys = "ctrl+shift+left"
command = "select.extend-word-backward"

[[keymap]]
keys = "ctrl+shift+right"
command = "select.extend-word-forward"

[[keymap]]
keys = "ctrl+shift+home"
command = "select.extend-file-start"

[[keymap]]
