command = "view.jump-back"

[[keymap]]
keys = "meta+right"
command = "view.jump-forward"

[[keymap]]
keys = "ctrl+-"
command = "view.jump-back"

[[keymap]]
keys = "ctrl+="
command = "view.jump-forward"

