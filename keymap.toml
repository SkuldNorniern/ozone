command = "pane.close"

[[keymap]]
keys = "ctrl+meta+right"
command = "pane.focus-right"

[[keymap]]
keys = "ctrl+meta+left"
command = "pane.focus-left"

[[keymap]]
keys = "ctrl+meta+down"
command = "pane.focus-down"

[[keymap]]
keys = "ctrl+meta+up"
command = "pane.focus-up"

