# Ozone configuration (reference / default).
#
# Copy this to your user config location to customize:
#   Windows: %APPDATA%\ozone\config.toml
#   Linux/macOS: ~/.config/ozone/config.toml
#
# Every field is optional — anything omitted (or invalid) falls back to the
# built-in default, so a partial or broken file never breaks the editor.

[editor]
font         = "Consolas"     # any installed font family
font_size    = 13             # points
line_height  = 1.4            # multiplier applied to font_size
tab_width    = 4
soft_tabs    = true
line_numbers = "relative"     # "off" | "absolute" | "relative"
cursor_style = "bar"          # "block" | "bar" | "underline"
scroll_off   = 8
word_wrap    = false
trim_trailing_whitespace = true
auto_save    = false
auto_format  = false
jump_list_size = 100

[theme]
name = "catppuccin-mocha"

[ui]
# Mouse interaction is deliberately opt-in. When enabled, clicking focuses a
# pane and places the cursor; Shift-click extends the selection.
mouse = false

# User keybindings layer over the shipped defaults. Chords and filetype scopes
# are active.
[[keymap]]
keys    = "ctrl+s"
command = "file.save"

[[keymap]]
keys    = "ctrl+z"
command = "edit.undo"

[[keymap]]
keys    = "ctrl+y"
command = "edit.redo"

[[keymap]]
keys    = "ctrl+shift+p"
command = "command.palette"

[[keymap]]
keys     = "ctrl+shift+f"
command  = "lsp.format"
filetype = "rust"

# Filetype-local defaults are applied when each file buffer is opened.
[[filetype]]
name = "markdown"
word_wrap = true
tab_width = 2

[[filetype]]
name = "makefile"
soft_tabs = false

# Autocommands execute through the same command registry as keybindings.
[[autocmd]]
event   = "buffer.pre-save"
pattern = "*"
command = "edit.trim-trailing-whitespace"

[[autocmd]]
event   = "buffer.filetype"
pattern = "rust"
command = "lsp.attach"

# LSP blocks are parsed but LSP itself remains deferred.
[[lsp]]
language = "rust"
server   = "rust-analyzer"
lazy     = true

[lsp.capabilities]
completion       = true
diagnostics      = true
hover            = true
goto_definition  = true
find_references  = true
rename           = true
format           = true
code_actions     = true
inlay_hints      = false
semantic_tokens  = false
code_lens        = false
