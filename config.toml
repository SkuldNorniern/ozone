# Ozone configuration (reference / default) — base sections.
#
# Copy this directory to your user config location to customize:
#   Windows: %APPDATA%\ozone\
#   Linux/macOS: ~/.config/ozone/
#
# Config is split by concern. This file holds the base sections; keymaps,
# autocommands, filetype settings, and language servers live in sibling files
# that are merged in:
#   keymap.toml    -> [keymap] / [[keymap]]
#   autocmd.toml   -> [[autocmd]]
#   filetype.toml  -> [[filetype]]
#   lsp.toml       -> [[lsp]]
#
# If a section file exists, the matching section here is ignored — keep each
# concern in one place. (You can still inline any section here if you prefer a
# single file; just don't create its section file.)
#
# Every field is optional — anything omitted (or invalid) falls back to the
# built-in default, so a partial or broken file never breaks the editor.

[editor]
font         = "Consolas"     # any installed font family
font_size    = 13             # points
line_height  = 1.4            # multiplier applied to font_size
tab_width    = 4
soft_tabs    = true
line_numbers = "relative"     # "off" | "absolute" | "relative"
cursor_style = "bar"          # "block" | "bar" | "underline"
scroll_off   = 8
word_wrap    = false
trim_trailing_whitespace = true

[theme]
name = "brewery-stout"        # bundled name, or a path to a custom .toml

[ui]
mouse = true                  # click to place cursor / drag-select; off = keyboard-only
indent_guides = true          # draw vertical lines at each indent level
hardware_acceleration = false # GPU (ZenGPU/Vulkan) rendering; needs a build with the
                              # `zengpu` feature. Override: --gpu/--no-gpu, OZONE_GPU=1
